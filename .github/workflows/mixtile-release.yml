name: Build Mixtile firmware

on:
  workflow_dispatch:
    inputs:
      series:
        description: OpenWrt stable series to build
        required: true
        type: choice
        options:
          - "24.10"
          - "25.12"
      board:
        description: Mixtile board to build
        required: true
        type: choice
        options:
          - "all"
          - "edge2"
          - "blade3"
      ref:
        description: Optional git ref to build
        required: false
        type: string
      publish_release:
        description: Create a draft GitHub release when building a tag
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "mixtile-v24.10.*"
      - "mixtile-v25.12.*"

permissions:
  contents: write

concurrency:
  group: mixtile-release-${{ github.event.inputs.ref || github.event.inputs.series || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      board: ${{ steps.meta.outputs.board }}
      boards: ${{ steps.meta.outputs.boards }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      ref: ${{ steps.meta.outputs.ref }}
      series: ${{ steps.meta.outputs.series }}
      tag: ${{ steps.meta.outputs.tag }}
      upstream_baseline: ${{ steps.meta.outputs.upstream_baseline }}

    steps:
      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            ref="${GITHUB_REF}"
            tag="${GITHUB_REF_NAME}"
            board="all"

            case "${tag}" in
              mixtile-v24.10.*) series="24.10" ;;
              mixtile-v25.12.*) series="25.12" ;;
              *)
                echo "::error::Unsupported Mixtile tag: ${tag}"
                exit 1
                ;;
            esac

            publish_release=true
          else
            series="${{ inputs.series }}"
            board="${{ inputs.board }}"
            ref="${{ inputs.ref }}"
            publish_release="${{ inputs.publish_release }}"
            tag=""

            if [[ -z "${ref}" ]]; then
              ref="openwrt-${series}"
            elif [[ "${ref}" == refs/tags/* ]]; then
              tag="${ref#refs/tags/}"
            elif [[ "${ref}" == mixtile-v* ]]; then
              tag="${ref}"
            fi
          fi

          if [[ "${board}" == "all" ]]; then
            boards='["edge2","blade3"]'
          else
            boards="[\"${board}\"]"
          fi

          upstream_baseline="openwrt-${series}"
          if [[ -n "${tag}" ]]; then
            maybe_baseline="$(echo "${tag}" | sed -E 's/^mixtile-v([0-9]+\.[0-9]+\.[0-9]+)-r[0-9]+$/v\1/')"
            if [[ "${maybe_baseline}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              upstream_baseline="${maybe_baseline}"
            fi
          fi

          echo "board=${board}" >> "${GITHUB_OUTPUT}"
          echo "boards=${boards}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${publish_release}" >> "${GITHUB_OUTPUT}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "series=${series}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "upstream_baseline=${upstream_baseline}" >> "${GITHUB_OUTPUT}"

  build:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.meta.outputs.boards) }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.meta.outputs.ref }}

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            file \
            flex \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-pyelftools \
            python3-setuptools \
            rsync \
            subversion \
            swig \
            unzip \
            wget \
            zlib1g-dev

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            dl
            .ccache
          key: ${{ runner.os }}-${{ needs.meta.outputs.series }}-${{ matrix.board }}-${{ hashFiles('configs/mixtile-*.config', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-${{ needs.meta.outputs.series }}-${{ matrix.board }}-
            ${{ runner.os }}-${{ needs.meta.outputs.series }}-

      - name: Update and install feeds
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        shell: bash
        run: |
          set -euo pipefail
          cat "configs/mixtile-${{ matrix.board }}-${{ needs.meta.outputs.series }}.config" > .config
          printf '%s\n' 'CONFIG_CCACHE=y' >> .config
          make defconfig

      - name: Download sources
        shell: bash
        run: |
          set -euo pipefail
          make download -j"$(nproc)"

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          make -j"$(nproc)" BUILD_LOG=1

      - name: Collect release assets
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          board="${{ matrix.board }}"
          target_dir="bin/targets/rockchip/armv8"
          mkdir -p release-assets

          find "${target_dir}" -maxdepth 1 -type f -name "*mixtile_${board}*" -exec cp {} release-assets/ \;

          for pattern in profiles.json sha256sums "*.buildinfo" "*.manifest"; do
            for path in "${target_dir}"/${pattern}; do
              if [[ -e "${path}" ]]; then
                cp "${path}" "release-assets/${board}-$(basename "${path}")"
              fi
            done
          done

      - name: Upload release assets
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: mixtile-${{ needs.meta.outputs.series }}-${{ matrix.board }}-firmware
          path: release-assets/
          if-no-files-found: error

      - name: Upload build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: mixtile-${{ needs.meta.outputs.series }}-${{ matrix.board }}-logs
          path: logs/
          if-no-files-found: warn

  release:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    if: ${{ needs.meta.outputs.publish_release == 'true' }}

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: mixtile-${{ needs.meta.outputs.series }}-*-firmware
          merge-multiple: true
          path: release-assets/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Mixtile OpenWrt ${{ needs.meta.outputs.tag }}
          draft: true
          prerelease: false
          body: |
            Upstream baseline: `${{ needs.meta.outputs.upstream_baseline }}`

            Supported devices:
            - Mixtile Edge 2
            - Mixtile Blade 3

            Upgrade path:
            - Stay within the same OpenWrt stable series for unattended sysupgrade.
            - Validate cross-series upgrades manually before publishing.

            Known issues:
            - Update this draft with device-specific validation notes before publishing.
          files: |
            release-assets/*
